name: Update feed

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install rss-parser

      - name: Collect feeds
        run: node collect.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated feed
        run: |
          git config user.name "reelfeed-bot"
          git config user.email "reelfeed-bot@users.noreply.github.com"
          git add feed.json
          git commit -m "Update feed" || echo "No changes"
          git push
